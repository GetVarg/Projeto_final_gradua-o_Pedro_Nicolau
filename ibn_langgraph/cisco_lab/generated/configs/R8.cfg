version 15.2
hostname R8
no ip domain-lookup
ip cef
ipv6 unicast-routing
!
interface GigabitEthernet0/0
 description connected_to 4-eth2
 ip address 10.0.8.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description connected_to h_8_1-eth0
 ip address 172.16.8.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.0.9
 network 10.0.8.0 0.0.0.3 area 0
 network 172.16.8.0 0.0.0.255 area 0
!
end
