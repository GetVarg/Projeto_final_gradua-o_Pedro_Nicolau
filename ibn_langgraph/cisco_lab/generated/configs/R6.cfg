version 15.2
hostname R6
no ip domain-lookup
ip cef
ipv6 unicast-routing
!
interface GigabitEthernet0/0
 description connected_to 3-eth1
 ip address 10.0.7.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description connected_to h_6_1-eth0
 ip address 172.16.6.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.0.7
 network 10.0.7.0 0.0.0.3 area 0
 network 172.16.6.0 0.0.0.255 area 0
!
end
