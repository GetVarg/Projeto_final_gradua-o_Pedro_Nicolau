version 15.2
hostname R9
no ip domain-lookup
ip cef
ipv6 unicast-routing
!
interface GigabitEthernet0/0
 description connected_to 0-eth2
 ip address 10.0.2.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description connected_to 7-eth1
 ip address 10.0.9.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description connected_to h_9_1-eth0
 ip address 172.16.9.1 255.255.255.0
 no shutdown
!
router ospf 1
 router-id 10.255.0.10
 network 10.0.2.0 0.0.0.3 area 0
 network 10.0.9.0 0.0.0.3 area 0
 network 172.16.9.0 0.0.0.255 area 0
!
end
