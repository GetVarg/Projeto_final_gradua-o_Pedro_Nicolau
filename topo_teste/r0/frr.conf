hostname r0
service integrated-vtysh-config
!
interface r0-eth1
 ip address 10.255.1.1/31
interface r0-eth2
 ip address 10.255.2.1/31
interface r0-eth3
 ip address 10.255.3.1/31
interface r0-eth4
 ip address 10.255.4.1/31
!
ip route 10.1.0.0/24 10.255.1.0
ip route 10.2.0.0/24 10.255.2.0
ip route 10.3.0.0/24 10.255.3.0
ip route 10.4.0.0/24 10.255.4.0
